# nginx reverse proxy configuration for the joining service.
#
# Routes:
#   /v1/*           → joining service (Node.js on port 3000)
#   /.well-known/*  → joining service
#   /*              → static UI assets from /data/ui/

worker_processes auto;
pid /tmp/nginx.pid;
error_log /data/logs/nginx-error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /data/logs/nginx-access.log;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Temp paths writable by non-root
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    upstream joining_service {
        server 127.0.0.1:3000;
    }

    server {
        listen 8080;

        # API routes → joining service
        location /v1/ {
            proxy_pass http://joining_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Well-known discovery → joining service
        location /.well-known/ {
            proxy_pass http://joining_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static UI assets
        location / {
            root /data/ui;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
